name: ayah_image_tool
description: Standalone tool to render and export Quran ayah images.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  quran_library:
    path: quran_library
  get: ^4.7.3
  get_storage: ^2.1.1
  share_plus: ^12.0.1
  path_provider: ^2.1.5

dependency_overrides:
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
